<!DOCTYPE html>
<html>
<head>
  <title>Digital Legacy Locker</title>

<style>
body {
  background:#0F172A;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.card {
  background:#1E293B;
  padding:20px;
  border-radius:12px;
  width:250px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover {
  opacity:0.8;
  transform:scale(1.05);
  transition:0.3s;
}

.save { background:#7C3AED; color:white; }
.add { background:#22C55E; color:white; }
.trigger { background:red; color:white; }

input {
  padding:10px;
  width:90%;
  margin-bottom:10px;
  border-radius:6px;
  border:none;
}
</style>

</head>

<body>

<h1 style="color:#7C3AED;">🔐 Digital Legacy Locker</h1>

<div style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap; margin-top:30px;">

<!-- Store Secret -->
<div class="card">
<h3>🔐 Store Secret</h3>
<input id="instaUser" placeholder="Instagram Username">
<input id="instaPass" type="password" placeholder="Instagram Password">
</div>

<div class="card">
<h4>🔑 Social Credentials</h4>
<input id="socialUser" placeholder="Instagram Username">
<input id="socialPass" type="password" placeholder="Instagram Password">
<button class="save" onclick="saveCredentials()">Save Credentials</button>
<div id="credentialsList" style="display:none;"></div>
</div>

<!-- Nominee -->
<div class="card">
<h3>👨‍👩‍👧 Nominee</h3>
<input id="email" placeholder="Email">
<button class="add" onclick="addNominee()">Add</button>
</div>

<!-- Trigger -->
<div class="card">
<h3>⚡ Trigger</h3>
<button class="trigger" onclick="goToAccess()">Activate</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

// 🔥 PASTE YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyB8xEa25No0fBTof7nXU2_oKCa6-scDkFk",
  authDomain: "digital-legacy-1.firebaseapp.com",
  projectId: "digital-legacy-1",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👇 KEEP YOUR FUNCTIONS SAME BUT MODIFY INSIDE

window.goToAccess = function() {
  window.location.href = "otp.html";
};

window.saveData = async function() {
  const message = document.getElementById("message").value;
  const lastMessage = document.getElementById("lastMessage").value;

  await addDoc(collection(db, "messages"), {
    message,
    lastMessage,
    createdAt: serverTimestamp()
  });

  alert("Saved securely 🔐");
};

window.addNominee = async function() {
  const email = document.getElementById("email").value;

  await addDoc(collection(db, "nominees"), {
    email,
    createdAt: serverTimestamp()
  });

  alert("Nominee added 👨‍👩‍👧");
};

window.saveCredentials = async function() {
  const username = document.getElementById("instaUser").value;
  const password = document.getElementById("instaPass").value;

  await addDoc(collection(db, "credentials"), {
    username,
    password,
    createdAt: serverTimestamp()
  });

  alert("Credentials saved 🔐");
};

</script>

</body>
</html>
